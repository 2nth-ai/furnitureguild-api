name = "furnitureguild-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — attaches fg-api.2nth.ai to this Worker and auto-creates
# the CNAME in the 2nth.ai zone. Replaces the *.workers.dev subdomain.
#
# Plus a path-specific route on erp-fg.2nth.ai/desk/* that handles the
# ERPNext v13 → v16 URL migration for us (browsers autofill old /desk/* URLs).
routes = [
  { pattern = "fg-api.2nth.ai", custom_domain = true },
  { pattern = "erp-fg.2nth.ai/desk/*", zone_name = "2nth.ai" }
]

# Comma-separated origins allowed by the CORS layer.
# furnitureguild.pages.dev (prod) + any preview branch deployment + localhost dev.
[vars]
ALLOWED_ORIGINS = "https://furnitureguild.pages.dev,https://feat-google-demo.know-2nth.pages.dev,http://localhost:8788,http://localhost:3000"

# Secrets (set via `wrangler secret put`, NOT in this file):
#   ERP_URL         = https://erp-fg.2nth.ai          (set after tunnel is up)
#   ERP_API_KEY     = <storefront-api user api_key>
#   ERP_API_SECRET  = <storefront-api user api_secret>
#   ERP_COMPANY     = Furniture Guild
